releaseNotes: |
  v0.10 (2026.05.30.10) - Phase 3 (query + repo)

  Two new models close the last two critical gaps from the v0.7 review:

  - @mfbaig35r/databricks/query (create, read, update, delete, list)
    Manages DBSQL saved queries via /api/2.0/sql/queries. The
    query_id that this model returns pairs with the job model's
    sql_task.query.query_id field.

  - @mfbaig35r/databricks/repo (create, read, update, pull, delete, list)
    Manages Databricks Git Repos via /api/2.0/repos. Real Databricks
    jobs reference notebooks via repo paths rather than uploading to
    /Shared/. `pull` re-sends the stored branch in the PATCH body
    (Databricks rejects empty-body PATCH).

  Smoke validated end-to-end on Databricks Free serverless:
  - query: list (empty), create with SELECT 1 on Starter warehouse,
    read, list (1 visible), delete
  - repo: create against github.com/mfbaig35r/swamp-databricks (public,
    no Git PAT setup required), read, pull (after fix), delete

  No breaking changes from v0.9.

  Total models: 15. End-to-end smoke validated since v0.1:
  job, notebook, dlt_pipeline, sql_warehouse, workspace_file,
  secret_scope, secret, uc_schema, uc_table, uc_volume, uc_catalog
  (list+schema-validated create), workspace_permissions, uc_permissions,
  query, repo. uc_table has no create (use sql_warehouse.run_query).
