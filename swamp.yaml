manifestVersion: 1
name: "@fbaig/databricks"
version: "2026.05.30.1"
description: "Databricks Jobs, DLT pipelines, and Unity Catalog resources as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - unity-catalog
platforms:
  - linux
  - darwin
models:
  - job.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  Initial release. Adds the @fbaig/databricks/job model with create, read,
  update (full reset), delete, run, wait_run, and cancel_run methods.
  Auth via PAT (resolved through CEL: vault.get) or OAuth M2M client_credentials.
  Azure MSI is stubbed.

  v1 task types validated by Zod: notebook_task, sql_task, pipeline_task.
  Other Databricks task types (spark_python_task, python_wheel_task, dbt_task,
  run_job_task, for_each_task, condition_task, spark_jar_task) will reject
  at the schema layer until added in subsequent releases.

  Preview surface (will move): upload_notebook and delete_notebook methods,
  and the 'notebook' resource, are convenience APIs for smoke-testing the
  run/wait_run loop end-to-end. They will split into a dedicated
  @fbaig/databricks/notebook model in v0.2. Workflows that call them by name
  will need to update the model reference at that point.

  Validated end-to-end on Databricks Free (AWS serverless): upload_notebook
  -> create -> run -> wait_run (TERMINATED+SUCCESS) -> delete -> delete_notebook,
  zero orphan workspace state.
