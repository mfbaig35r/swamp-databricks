manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.12"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks/files, secrets, Unity Catalog, permissions, DBSQL queries, and Git Repos as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
  - permissions
  - git-repos
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_catalog.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
  - workspace_permissions.ts
  - uc_permissions.ts
  - query.ts
  - repo.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.12 (2026.05.30.12) - examples/api-ingest reference implementation

  Adds a documented reference pattern for the most common Databricks
  question: "how do I pull data from an external API into a Delta table?"

  examples/api-ingest/README.md describes the universal architecture:
  - Bronze raw_json + metadata columns (schema-drift immune)
  - Silver typed extraction via SQL
  - Rate-limited Spark fan-out using mapInPandas (NOT rdd.mapPartitions;
    serverless rejects RDD ops)
  - Token bucket per partition, single Session per partition, retries
    on 429/5xx only

  examples/api-ingest/met-museum/ is the runnable reference. The Met
  Museum API is public (no auth), so the workflow runs on Databricks
  Free out of the box.

  - workflow.yaml: full Swamp workflow that ties uc_schema, notebook,
    job, sql_warehouse, and uc_table together end-to-end.
  - notebook-bronze.py: standalone reviewable notebook source.
  - silver-typed.sql: SQL transform from Bronze to Silver.
  - README.md: Met-specific runtime expectations, limitations.

  Validated end-to-end with MAX_OBJECTS=10 on Databricks Free serverless:
  TERMINATED + SUCCESS in ~30 sec wall, 10 rows in Bronze (100% success),
  10 typed rows in Silver including real Met records (e.g.
  "One-dollar Liberty Head Coin" by James Barton Longacre).

  No code changes from v0.11. No new models. Documentation-only release.
