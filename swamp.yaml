releaseNotes: |
  v0.15 (2026.05.30.15) - agent template library

  Adds four canonical templates under examples/agent-templates/ that
  the swamp-databricks-author skill points at when generating new
  workflows:

  - file-ingest-from-s3: CSV/Parquet/JSON from S3 to UC Bronze + Silver,
    with secret_scope-managed AWS creds; production schema detection
    delegates to AGI's ingest_to_evidence
  - api-ingest-authenticated: rate-limited API ingest with Bearer auth
    and cursor pagination; Stripe customers as the worked example
  - dbt-run: scheduled dbt deps + run + test via the repo + dbt_task
    models; no custom notebook
  - ml-training: read training data from UC, train + MLflow autolog +
    optional predictions write; scikit-learn placeholder ready to swap

  Each template ships README + workflow.yaml in the registry archive
  (the workflow.yaml has the notebook content inlined). The standalone
  notebook.py for each lives only on GitHub, per the safety analyzer's
  .ts/.json/.md/.yaml/.yml/.txt allowlist.

  SKILL.md updated to cross-reference the templates explicitly. Skill
  triggers + activation rules unchanged.

  Archive grew from 82.4 KB to ~98 KB. Models, code, and bug fixes
  unchanged from v0.14.
