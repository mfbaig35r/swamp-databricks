manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.2"
description: "Databricks Jobs, DLT pipelines, Unity Catalog, and workspace notebooks as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - unity-catalog
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.2 (2026.05.30.2)

  - New model: @mfbaig35r/databricks/notebook. Owns upload, read (export),
    and delete for workspace notebooks. The upload_notebook / delete_notebook
    methods and 'notebook' resource have moved off the job model into this
    dedicated model. Workflows that called those methods on the job model
    in v0.1 must update their `model:` references to the new model.

  - New model: @mfbaig35r/databricks/dlt_pipeline. Lifecycle for Delta Live
    Tables pipelines: create, read, update (full replace via PUT), delete,
    start_update (POST /pipelines/{id}/updates), wait_update (poll until
    COMPLETED / FAILED / CANCELED), stop. Libraries support notebook or file
    references. On Databricks Free serverless, set `serverless: true` on
    create. Note: DLT pipeline behavior on Databricks Free has not been
    validated end-to-end yet; treat as preview until smoke-tested.

  - Refactor: workspace auth + bearer fetch + global args schema extracted
    into extensions/models/_lib/databricks.ts. All three models share one
    auth surface.

  - Breaking from v0.1: upload_notebook / delete_notebook removed from
    @mfbaig35r/databricks/job. Workflows that used those must switch to
    @mfbaig35r/databricks/notebook upload / delete.
