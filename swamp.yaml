manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.3"
description: "Databricks Jobs, DLT pipelines, Unity Catalog, and workspace notebooks as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - unity-catalog
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.3 (2026.05.30.3)

  - DLT pipeline model validated end-to-end on Databricks Free serverless.
    The "preview" caveat from v0.2 is removed.

  - Schema fix: PipelineSettings now requires `catalog` when `serverless: true`
    via a Zod .refine(). Surfaces the Databricks API constraint at validation
    time instead of as a 400 INVALID_PARAMETER_VALUE on create.

  - README clarifies that DELETE /api/2.0/pipelines/{id} does NOT drop the
    Delta tables a pipeline materialized. After deleting a pipeline, tables
    in the target schema persist; remove them with a DROP TABLE in a SQL
    warehouse or notebook. A future @mfbaig35r/databricks/sql_warehouse model
    will make this a Swamp-native operation.

  No breaking changes from v0.2.
