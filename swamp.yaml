manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.8"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks and files, secrets, and Unity Catalog (catalogs/schemas/tables/volumes) as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_catalog.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.8 (2026.05.30.8) - Phase 1: uc_catalog + idempotency

  - New model: @mfbaig35r/databricks/uc_catalog (create, read, update,
    delete, list, create_or_update). Completes the UC top-down tree:
    catalog -> schema -> table/volume.

  - New `create_or_update` method on: job, dlt_pipeline, sql_warehouse,
    secret_scope, uc_catalog, uc_schema, uc_volume. Reconcile semantics:
    if a resource with args.name exists in Swamp's data layer, take the
    update path (PATCH/PUT/reset); otherwise create. Closes the "create
    errors on second run" gap that blocked real automation.

  Tombstone caveat: `create_or_update` checks Swamp's data layer, not
  the workspace. If you call `delete` and then `create_or_update` with
  the same name, the second call will hit the patch path against a
  workspace resource that no longer exists and fail. For now, delete +
  recreate flows should use `create` explicitly. v0.9 may add a
  workspace-first lookup variant.

  notebook.upload and workspace_file.upload already have idempotency via
  `overwrite: true`. secret.put is already idempotent (Databricks
  replaces on put). uc_table has no create endpoint so no
  create_or_update.

  Smoke validated on Free serverless: catalog list (3 catalogs visible),
  schema create_or_update fresh-call (create path) + same-call-again
  (patch path), delete cleanup. uc_catalog.create requires storage_root
  on Free (no default metastore storage available); ships as
  schema-validated.

  No breaking changes from v0.7.
