manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.16"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks/files, secrets, Unity Catalog, permissions, DBSQL queries, and Git Repos as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
  - permissions
  - git-repos
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_catalog.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
  - workspace_permissions.ts
  - uc_permissions.ts
  - query.ts
  - repo.ts
skills:
  - swamp-databricks-author
additionalFiles:
  - README.md
  - LICENSE.txt
  - examples/api-ingest/README.md
  - examples/api-ingest/met-museum/README.md
  - examples/api-ingest/met-museum/workflow.yaml
  - examples/agent-templates/README.md
  - examples/agent-templates/file-ingest-from-s3/README.md
  - examples/agent-templates/file-ingest-from-s3/workflow.yaml
  - examples/agent-templates/api-ingest-authenticated/README.md
  - examples/agent-templates/api-ingest-authenticated/workflow.yaml
  - examples/agent-templates/dbt-run/README.md
  - examples/agent-templates/dbt-run/workflow.yaml
  - examples/agent-templates/ml-training/README.md
  - examples/agent-templates/ml-training/workflow.yaml
releaseNotes: |
  v0.16 (2026.05.30.16) - documentation cross-linking

  Documentation-only release. Cross-links the agent-templates library
  from the discoverable entry points:

  - Main README: Examples section now lists agent-templates/ alongside
    api-ingest/
  - examples/api-ingest/README.md: authenticated-API note points at
    examples/agent-templates/api-ingest-authenticated/
  - examples/api-ingest/met-museum/README.md: "for authenticated APIs"
    section points at the template instead of inline instructions

  AGI's README at github.com/mfbaig/artificial-general-ingestion now
  links back to the file-ingest-from-s3 template as the recommended
  orchestration story (AGI owns the ingest algorithm; Swamp pack owns
  declarative composition).

  No code, no skill, no template changes. Archive 96.5 KB -> ~98 KB.
