manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.6"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks, and workspace files as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.6 (2026.05.30.6)

  - New model: @mfbaig35r/databricks/workspace_file. Owns upload, read
    (export), and delete for workspace files (FILE object type). Distinct
    from @mfbaig35r/databricks/notebook (which owns NOTEBOOK objects).
    Use this when a downstream task references a plain file at a workspace
    path: sql_task.file, spark_python_task.python_file, dbt project files,
    etc.

  - sql_task end-to-end validated. Closes the v0.5 gap: workspace_file
    upload -> job with sql_task.file -> run -> wait_run COMPLETED + SUCCESS
    on Databricks Free serverless.

  - upload uses POST /api/2.0/workspace/import with format=AUTO and no
    language, then calls /api/2.0/workspace/get-status to verify and
    record the resulting object_type on the resource. Modern workspaces
    produce FILE; older workspaces may produce NOTEBOOK depending on
    content, and the resource reflects what was created.

  No breaking changes from v0.5.
