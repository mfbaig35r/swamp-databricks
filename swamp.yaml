manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.4"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, and workspace notebooks as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.4 (2026.05.30.4)

  - New model: @mfbaig35r/databricks/sql_warehouse. Lifecycle (create, read,
    update, delete, start, stop) plus SQL Statement Execution (run_query,
    wait_statement, cancel_statement). run_query waits synchronously up to
    50 seconds; longer-running statements get a last_statement resource so
    wait_statement can take over.

  - sql_warehouse.adopt method: register an existing workspace warehouse as
    a Swamp resource without creating a new one. Required pattern on
    Databricks Free where warehouse quotas are small and the workspace ships
    with a Starter Warehouse already.

  - This closes the DLT cleanup gap from v0.3: run_query can execute the
    DROP TABLE for tables materialized by a deleted pipeline.

  No breaking changes from v0.3.
