manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.13"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks/files, secrets, Unity Catalog, permissions, DBSQL queries, and Git Repos as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
  - permissions
  - git-repos
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_catalog.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
  - workspace_permissions.ts
  - uc_permissions.ts
  - query.ts
  - repo.ts
additionalFiles:
  - README.md
  - LICENSE.txt
  - examples/api-ingest/README.md
  - examples/api-ingest/met-museum/README.md
  - examples/api-ingest/met-museum/workflow.yaml
releaseNotes: |
  v0.13 (2026.05.30.13) - examples actually ship in the archive

  Packaging fix. v0.12 added examples/api-ingest/ to the GitHub repo but
  the manifest's additionalFiles only listed README.md and LICENSE.txt,
  so the published archive on swamp.club did not include the examples
  themselves. The README that shipped referenced examples/ paths that
  did not resolve in pulled copies.

  v0.13 lists the publishable example files in additionalFiles:
  - examples/api-ingest/README.md
  - examples/api-ingest/met-museum/README.md
  - examples/api-ingest/met-museum/workflow.yaml

  The workflow.yaml is self-contained (notebook Python and Silver SQL
  are inlined), so running the example from a pulled copy works.

  The standalone notebook-bronze.py and silver-typed.sql files stay
  GitHub-only because Swamp's safety analyzer restricts the archive
  to .ts .json .md .yaml .yml .txt extensions. The Met README links
  to GitHub for those two files.

  No code changes from v0.12.
