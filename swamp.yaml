releaseNotes: |
  v0.18 (2026.05.30.18) - MLflow + UC Model Registry models

  Four new models for the ML training-to-deployment lifecycle:

  - @mfbaig35r/databricks/mlflow_experiment: create, read, update,
    set_tag, delete, list, create_or_update. Workspace MLflow
    experiment lifecycle. Smoke-validated end-to-end on Free.
  - @mfbaig35r/databricks/registered_model: create, read, update,
    delete, list, create_or_update. UC Model Registry (the
    successor to the legacy workspace registry). Smoke-validated
    end-to-end on Free.
  - @mfbaig35r/databricks/model_version: create (from MLflow run),
    read, update_alias (production/staging/champion), delete, list.
    Schema-validated; end-to-end needs an MLflow run with a logged
    model artifact (run ml-training template first to produce one).
  - @mfbaig35r/databricks/model_serving_endpoint: create, read,
    update_config, delete, list, invoke. PAID DATABRICKS ONLY -
    schema-validated, end-to-end pending until paid workspace.

  ml-training template refactored to use the new models:
  - mlflow_experiment.create_or_update at the top (ensures experiment
    exists before the notebook calls mlflow.start_run)
  - registered_model + model_version + update_alias steps after the
    training job (commented out by default with TODO for the user to
    enable after a successful run produces a run_id)
  - model_serving_endpoint.create step at the end (commented out,
    flagged paid-only)

  SKILL.md updated: ML training section now documents the explicit
  MLflow lifecycle as Swamp steps instead of "lives inside the
  notebook."

  Total models: 19. Closes the "MLflow models are on the roadmap"
  item from the v0.17 close-out. Archive grows ~17 KB (4 new models +
  template + skill updates).
