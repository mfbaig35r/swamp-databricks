manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.5"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, and workspace notebooks as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.5 (2026.05.30.5)

  - Expanded job task-type schema from 3 types to 10. Added: spark_python_task,
    spark_jar_task, python_wheel_task, dbt_task, run_job_task, condition_task,
    for_each_task (Zod recursive via z.lazy). sql_task now also covers
    dashboard and alert variants alongside query and file. Workflows that
    use any of these no longer reject at the schema layer.

  - End-to-end smoke validation in this release covers notebook_task only
    (matches what the Databricks Free smoke environment can reasonably
    exercise). Other task types are schema-validated; the Databricks API
    accepts the schemas at job-create time. If you hit an edge case on a
    real workload, open an issue at github.com/mfbaig35r/swamp-databricks.

  Not yet covered: spark_submit_task, clean_rooms_notebook_task. Add in a
  later release if there is real demand.

  No breaking changes from v0.4.
