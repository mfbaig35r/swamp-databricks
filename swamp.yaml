manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.17"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks/files, secrets, Unity Catalog, permissions, DBSQL queries, and Git Repos as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
  - permissions
  - git-repos
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_catalog.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
  - workspace_permissions.ts
  - uc_permissions.ts
  - query.ts
  - repo.ts
skills:
  - swamp-databricks-author
additionalFiles:
  - README.md
  - LICENSE.txt
  - examples/api-ingest/README.md
  - examples/api-ingest/met-museum/README.md
  - examples/api-ingest/met-museum/workflow.yaml
  - examples/agent-templates/README.md
  - examples/agent-templates/file-ingest-from-s3/README.md
  - examples/agent-templates/file-ingest-from-s3/workflow.yaml
  - examples/agent-templates/api-ingest-authenticated/README.md
  - examples/agent-templates/api-ingest-authenticated/workflow.yaml
  - examples/agent-templates/dbt-run/README.md
  - examples/agent-templates/dbt-run/workflow.yaml
  - examples/agent-templates/ml-training/README.md
  - examples/agent-templates/ml-training/workflow.yaml
releaseNotes: |
  v0.17 (2026.05.30.17) - Phase 4 smoke fixes

  Real flags surfaced by Phase 4 smoke test (fresh subagent given a
  Stripe-charges-ingest prompt with no skill context). Two template
  fixes, one documentation reinforcement.

  1. api-ingest-authenticated template: explicit warning comments in
     both standalone notebook.py and inlined workflow.yaml content
     pointing out that mode("overwrite") silently wipes incremental
     data; switch to mode("append") + MERGE INTO if going incremental.
  2. All four templates: added an optional `uc_permissions.update`
     step at the end (commented out, with TODO). SKILL.md item #6
     says to ask about downstream consumers but no template had a
     structural slot for grants. Now they do.
  3. agent-templates/README.md: explicit drift-warning section about
     the notebook.py / inlined-workflow.yaml copy drift.

  No skill changes (skill correctly forked the right template and
  applied disciplines; flags were template content, not skill
  behavior). No model changes.

  Phase 4 verdict: skill loop works end-to-end. Smoke surfaced three
  template-level improvements without hitting any skill or model bug.
