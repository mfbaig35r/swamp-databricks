manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.7"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks and files, secrets, and Unity Catalog objects as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.7 (2026.05.30.7)

  Five new models, ten total.

  Secrets (workspace-level, distinct from Swamp vault):
  - @mfbaig35r/databricks/secret_scope: create, list, delete.
  - @mfbaig35r/databricks/secret: put, delete, list (keys only, never values).
    Secret values pass through to Databricks and are NEVER persisted in
    Swamp's data layer. Pass values via CEL ${{ vault.get(...) }}.

  Unity Catalog:
  - @mfbaig35r/databricks/uc_schema: create, read, update, delete, list.
  - @mfbaig35r/databricks/uc_table: read, delete, list. Tables are NOT
    created via this API; use sql_warehouse.run_query or a job notebook
    task to CREATE TABLE, then this model captures the snapshot.
  - @mfbaig35r/databricks/uc_volume: create, read, update, delete, list.

  No breaking changes from v0.6.
