manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.9"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks and files, secrets, Unity Catalog (catalogs/schemas/tables/volumes), and permissions (workspace + UC) as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
  - permissions
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_catalog.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
  - workspace_permissions.ts
  - uc_permissions.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.9 (2026.05.30.9) - Phase 2 (permissions)

  Phase 1 (uc_catalog + idempotency):
  - New model: @mfbaig35r/databricks/uc_catalog (create, read, update,
    delete, list, create_or_update). Completes the UC top-down tree.
  - New `create_or_update` method on: job, dlt_pipeline, sql_warehouse,
    secret_scope, uc_catalog, uc_schema, uc_volume. Reconcile semantics
    via Swamp data layer.

  Phase 2 (permissions):
  - New model: @mfbaig35r/databricks/workspace_permissions
    (get, set, update, list_levels). Workspace-level ACLs for jobs,
    pipelines, warehouses, notebooks, repos, queries, dashboards,
    alerts, experiments, registered-models, serving-endpoints,
    clusters, cluster-policies, instance-pools.
  - New model: @mfbaig35r/databricks/uc_permissions
    (get, get_effective, update). UC grants on catalogs, schemas,
    tables, volumes, functions, external_locations, storage_credentials,
    models. Changes-style PATCH (add/remove per principal).

  Smoke validated end-to-end on Free serverless:
  - uc_schema.create_or_update fresh create + same-call patch
  - workspace_permissions.list_levels (5 levels for sql/warehouses),
    get on Starter Warehouse, update to grant CAN_VIEW on a job to
    `users` group
  - uc_permissions.get on workspace catalog, update to grant
    USE_SCHEMA on a smoke schema to `account users`, verify

  Tombstone caveat (Phase 1): create_or_update checks Swamp data layer
  not workspace. After delete, the resource is tombstoned and
  create_or_update will mistakenly take the update path. Use create()
  explicitly for delete-then-recreate flows. v0.9 candidate fix:
  workspace-first lookup.

  uc_catalog.create requires storage_root on Free (no default
  metastore storage); ships as schema-validated only.

  No breaking changes from v0.7.
