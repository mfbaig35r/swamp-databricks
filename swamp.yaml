manifestVersion: 1
name: "@mfbaig35r/databricks"
version: "2026.05.30.11"
description: "Databricks Jobs, DLT pipelines, SQL warehouses, workspace notebooks/files, secrets, Unity Catalog, permissions, DBSQL queries, and Git Repos as Swamp models. Compose Databricks pipelines with non-Databricks resources in Swamp workflows."
repository: "https://github.com/mfbaig35r/swamp-databricks"
labels:
  - databricks
  - data
  - pipelines
  - dlt
  - sql
  - unity-catalog
  - secrets
  - permissions
  - git-repos
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
models:
  - job.ts
  - notebook.ts
  - dlt_pipeline.ts
  - sql_warehouse.ts
  - workspace_file.ts
  - secret_scope.ts
  - secret.ts
  - uc_catalog.ts
  - uc_schema.ts
  - uc_table.ts
  - uc_volume.ts
  - workspace_permissions.ts
  - uc_permissions.ts
  - query.ts
  - repo.ts
additionalFiles:
  - README.md
  - LICENSE.txt
releaseNotes: |
  v0.11 (2026.05.30.11) - bug fix

  Fix: create_or_update tombstone bug. Previously after `delete`,
  readResource returned tombstoned data not null, so create_or_update
  took the PATCH/PUT/reset path against a workspace resource that no
  longer existed and 404'd. Affected: job, dlt_pipeline, sql_warehouse,
  secret_scope, uc_catalog, uc_schema, uc_volume.

  Fix is workspace-first reconciliation: each create_or_update now
  checks the workspace via GET (or list for secret_scope) before
  deciding which path to take. New helper existsOnWorkspace in
  _lib/databricks.ts. Smoke-validated on Free: uc_schema and job
  delete-then-create_or_update both correctly take create path now.

  Side benefit: also handles out-of-band workspace deletes (someone
  deletes the job via UI, then create_or_update via Swamp correctly
  recreates instead of failing).

  No breaking changes from v0.10.
